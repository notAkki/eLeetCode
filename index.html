<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetCode Tracker Playground</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #0f0f0f;
        color: #f5f5f5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .mock-page {
        display: grid;
        grid-template-columns: minmax(320px, 42%) 1fr;
        gap: 1px;
        min-height: 100vh;
        background: #262626;
      }

      .mock-panel {
        background: #1a1a1a;
        padding: 24px;
      }

      .mock-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
      }

      .mock-toolbar button,
      .mock-language,
      .mock-timer {
        border: 1px solid #3a3a3a;
        border-radius: 999px;
        background: #2c2c2c;
        color: #f5f5f5;
        padding: 8px 12px;
        font: inherit;
      }

      .mock-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .text-title-large a {
        color: #f5f5f5;
        font-size: 22px;
        font-weight: 600;
        text-decoration: none;
      }

      .text-difficulty-easy {
        color: #00b8a3;
        font-size: 14px;
        font-weight: 500;
      }

      .mock-copy {
        max-width: 58ch;
        color: #d4d4d4;
        line-height: 1.65;
      }

      .mock-editor {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .monaco-editor textarea.inputarea {
        min-height: 420px;
        resize: vertical;
        border: 0;
        border-radius: 8px;
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 18px;
        font:
          13px/1.6 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }

      @media (max-width: 800px) {
        .mock-page {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="mock-page">
      <section class="mock-panel">
        <div class="mock-toolbar">
          <button id="dev-accepted-button" type="button">Trigger Accepted</button>
          <span data-e2e-locator="submission-result">Ready</span>
        </div>

        <div class="mock-title-row">
          <div class="text-title-large">
            <a href="/problems/two-sum/">1. Two Sum</a>
          </div>
          <span class="text-difficulty-easy">Easy</span>
        </div>

        <p class="mock-copy">
          Given an array of integers nums and an integer target, return indices
          of the two numbers such that they add up to target.
        </p>
      </section>

      <section class="mock-panel mock-editor">
        <div class="mock-toolbar">
          <button
            class="mock-language"
            type="button"
            aria-haspopup="dialog"
            aria-controls="radix-dev-language"
            data-state="closed"
          >
            Python3
          </button>
          <div class="mock-timer" role="button" aria-label="00:14:32">
            <svg data-icon="stopwatch" width="0" height="0"></svg>
            00:14:32
          </div>
        </div>

        <div class="monaco-editor">
          <textarea class="inputarea" spellcheck="false">class Solution:
    def twoSum(self, nums: List[int], target: int) -> List[int]:
        seen = {}
        for index, value in enumerate(nums):
            need = target - value
            if need in seen:
                return [seen[need], index]
            seen[value] = index
        return []</textarea>
        </div>
      </section>
    </main>

    <script type="module" src="/src/dev/main.tsx"></script>
  </body>
</html>
